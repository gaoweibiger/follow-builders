name: Daily Digest to Feishu

on:
  schedule:
    # ⚠️ 近时验证②（gh workflow enable 之后）：UTC 01:48（北京 09:48）。
    #    若触发→schedule 已修复，立即定稿 '13 16 * * *'（北京 00:13 半夜，避开整点拥堵）。
    - cron: '48 1 * * *'
  workflow_dispatch: {}   # 支持在 Actions 页面手动点按钮测试

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Remix and send
        env:
          LLM_API_KEY:       ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:      ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL:         ${{ secrets.LLM_MODEL }}
          LLM_MAX_TOKENS:    ${{ secrets.LLM_MAX_TOKENS }}
          DIGEST_LANGUAGE:   ${{ secrets.DIGEST_LANGUAGE }}
          DIGEST_PREFERENCE: ${{ secrets.DIGEST_PREFERENCE }}
          INCLUDE_AIHOT:     ${{ secrets.INCLUDE_AIHOT }}
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_OPEN_ID:    ${{ secrets.FEISHU_OPEN_ID }}
        run: node scripts/remix-and-send.js
